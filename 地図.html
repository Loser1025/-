<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弁護士面談開催地（指定駅のみ）から半径50kmの圏域地図</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* 地図コンテナのスタイル */
        #map {
            /* 画面全体の高さを使い、上下左右に少し余白を持たせる */
            height: calc(100vh - 32px); 
            width: 100%;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        /* ポップアップのスタイルを日本語で見やすく調整 */
        .leaflet-popup-content {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div id="map" class="mx-auto"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            crossorigin=""></script>

    <script>
        // === 1. 地図の初期設定 ===
        
        // 地図の中心座標 (全国をある程度カバーするため、本州の中心付近)
        const initialLat = 37.0;
        const initialLon = 137.5;
        // 圏域が狭くなるため、ズームレベルを5に設定
        const initialZoom = 5; 
        
        // Leafletで地図を初期化
        const map = L.map('map').setView([initialLat, initialLon], initialZoom);

        // 国土地理院の淡色地図（見やすく、円が目立つように）
        const gsiTile = 'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png';
        const attribution = '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">地理院タイル</a>';

        L.tileLayer(gsiTile, {
            attribution: attribution,
            maxZoom: 18,
        }).addTo(map);

        // === 2. 弁護士面談の開催地のデータ (提供されたリストの座標のみを使用) ===
        // 半径を50kmに変更 = 50,000メートルに設定
        const RADIUS_M = 50000;  

        // ユーザーが提示した座標データのみを抽出
        const eventLocations = [
            // 北海道
            { city: "函館駅 (北海道)", lat: 41.772352, lon: 140.727844 },
            { city: "札幌駅 (北海道)", lat: 43.066417, lon: 141.350556 },
            { city: "旭川駅 (北海道)", lat: 43.762912, lon: 142.358265 },
            // 青森県
            { city: "青森駅 (青森県)", lat: 40.828853, lon: 140.734692 },
            // 宮城県
            { city: "仙台駅 (宮城県)", lat: 38.259720, lon: 140.879971 },
            // 秋田県 (ただし鶴岡市は山形県に所在)
            { city: "鶴岡駅 (山形県)", lat: 38.739778, lon: 139.835750 },
            // 福島県
            { city: "郡山駅 (福島県)", lat: 37.398064, lon: 140.385489 },
            // 茨城県
            { city: "水戸駅 (茨城県)", lat: 36.370887, lon: 140.476427 },
            // 栃木県
            { city: "宇都宮駅 (栃木県)", lat: 36.558889, lon: 139.898361 },
            // 群馬県
            { city: "前橋駅 (群馬県)", lat: 36.383169, lon: 139.072478 },
            // 埼玉県
            { city: "さいたま新都心駅 (埼玉県)", lat: 35.893836, lon: 139.633575 },
            // 千葉県
            { city: "柏駅 (千葉県)", lat: 35.862222, lon: 139.971056 },
            { city: "木更津駅 (千葉県)", lat: 35.381611, lon: 139.926222 },
            // 東京都
            { city: "新宿駅 (東京都)", lat: 35.689579, lon: 139.700676 },
            { city: "八丁堀駅 (東京都)", lat: 35.674583, lon: 139.777778 },
            { city: "虎ノ門駅 (東京都)", lat: 35.670167, lon: 139.750063 },
            { city: "日本橋駅 (東京都)", lat: 35.682527, lon: 139.773717 },
            // 神奈川県/静岡県 (横浜駅は神奈川県、沼津駅は静岡県だが、リストに記載があるため両方採用)
            { city: "横浜駅 (神奈川県)", lat: 35.466069, lon: 139.622620 },
            { city: "沼津駅 (静岡県)", lat: 35.103085, lon: 138.859532 },
            // 新潟県
            { city: "新潟駅 (新潟県)", lat: 37.912028, lon: 139.061889 },
            // 石川県
            { city: "金沢駅 (石川県)", lat: 36.578205, lon: 136.647760 },
            // 長野県
            { city: "長野駅 (長野県)", lat: 36.643114, lon: 138.188738 },
            // 岐阜県
            { city: "岐阜駅 (岐阜県)", lat: 35.409514, lon: 136.756521 },
            // 静岡県
            { city: "静岡駅 (静岡県)", lat: 34.971611, lon: 138.388556 },
            // 愛知県
            { city: "名古屋駅 (愛知県)", lat: 35.170694, lon: 136.881637 },
            // 三重県
            { city: "津駅 (三重県)", lat: 34.734504, lon: 136.510197 },
            // 滋賀県
            { city: "大津駅 (滋賀県)", lat: 35.003000, lon: 135.864897 },
            // 大阪府
            { city: "大阪駅 (大阪府)", lat: 34.701889, lon: 135.494972 },
            // 兵庫県
            { city: "三ノ宮駅 (兵庫県)", lat: 34.694553, lon: 135.194818 },
            // 岡山県
            { city: "岡山駅 (岡山県)", lat: 34.666370, lon: 133.918589 },
            // 広島県
            { city: "広島駅 (広島県)", lat: 34.397750, lon: 132.475472 },
            // 山口県
            { city: "新山口駅 (山口県)", lat: 34.093472, lon: 131.397556 },
            // 香川県
            { city: "高松駅 (香川県)", lat: 34.350320, lon: 134.046554 },
            // 愛媛県
            { city: "松山駅 (愛媛県)", lat: 33.840738, lon: 132.752367 },
            // 福岡県
            { city: "博多駅 (福岡県)", lat: 33.590000, lon: 130.420611 },
            // 長崎県
            { city: "長崎駅 (長崎県)", lat: 32.752329, lon: 129.869128 },
            // 熊本県
            { city: "熊本駅 (熊本県)", lat: 32.790000, lon: 130.688889 },
            // 大分県
            { city: "大分駅 (大分県)", lat: 33.233375, lon: 131.606453 },
            // 宮崎県
            { city: "宮崎駅 (宮崎県)", lat: 31.915675, lon: 131.431989 },
            // 鹿児島県
            { city: "鹿児島中央駅 (鹿児島県)", lat: 31.581561, lon: 130.542289 },
            // 沖縄県
            { city: "旭橋駅 (沖縄県)", lat: 26.211966, lon: 127.675404 }
        ];

        // === 3. 円とマーカーの描画処理 ===
        eventLocations.forEach(location => { 
            const latlng = [location.lat, location.lon];
            const popupContent = `
                ${location.city}<br>
                半径 50km 圏内
            `;

            // 50kmの円を描画
            L.circle(latlng, {
                color: '#E04E4E',        // 円の枠線色 (赤系)
                fillColor: '#E04E4E',    // 塗りつぶし色
                fillOpacity: 0.2,        // 塗りつぶしの透明度
                radius: RADIUS_M         // 半径 (メートル単位)
            }).bindPopup(popupContent).addTo(map);

            // 中心点にマーカーを追加
            L.marker(latlng).bindPopup(popupContent).addTo(map);
        });

        // 全てのマーカーと円が収まるように地図のビューを調整
        const latlngs = eventLocations.map(loc => [loc.lat, loc.lon]);
        if (latlngs.length > 0) {
            // 範囲の境界線（Bounds）を作成し、マップにフィットさせる
            const bounds = L.latLngBounds(latlngs);
            map.fitBounds(bounds, {
                padding: [50, 50] // 周囲に余白を持たせる
            });
        }

    </script>
</body>
</html>
