<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>対応・NA 一括登録ツール</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --consulter-bg: #aad6ec;
            --consulter-sub: #d1e1ec;
        }
        body { background: #f8f9fc; font-size: 14px; }
        .consulter-color { background-color: var(--consulter-bg) !important; }
        .consulter-sub { background-color: var(--consulter-sub); }

        .card { border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; }
        .card-header { padding: 10px 16px; font-weight: bold; }

        .table-input { width: 100%; border-collapse: collapse; }
        .table-input th {
            background: var(--consulter-sub);
            padding: 7px 10px;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid #ccc;
            white-space: nowrap;
        }
        .table-input td {
            padding: 7px 10px;
            border: 1px solid #ccc;
            vertical-align: middle;
        }

        .badge-auto {
            background: #17a2b8;
            color: #fff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            color: #555;
            margin-bottom: 4px;
        }

        /* ログエリア */
        #log-area {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 12px;
            height: 260px;
            overflow-y: auto;
            border-radius: 4px;
        }
        #log-area .log-ok   { color: #4ec9b0; }
        #log-area .log-err  { color: #f44747; }
        #log-area .log-warn { color: #dcdcaa; }
        #log-area .log-info { color: #9cdcfe; }

        .progress { height: 22px; border-radius: 4px; }
        .progress-bar { font-size: 13px; line-height: 22px; }

        /* ボタン */
        .btn-run  { background: #1c6ea4; color: #fff; font-weight: bold; }
        .btn-run:hover { background: #155080; color: #fff; }
        .btn-stop { background: #c0392b; color: #fff; font-weight: bold; }

        .form-control-sm { font-size: 13px; }
        select.form-control { font-size: 13px; }

        #csv-preview {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px 12px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3" style="max-width:960px;">

    <h4 class="mb-3">
        <i class="fas fa-robot mr-2" style="color:#1c6ea4;"></i>
        対応・NA 一括登録ツール
    </h4>

    <!-- ログイン設定 -->
    <div class="card">
        <div class="card-header consulter-color d-flex align-items-center">
            <i class="fas fa-key mr-2"></i> ログイン設定
            <button class="btn btn-sm btn-link ml-auto" type="button" data-toggle="collapse" data-target="#login-section">
                <i class="fas fa-chevron-down"></i>
            </button>
        </div>
        <div class="collapse show" id="login-section">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="section-title">ログインID</label>
                        <input type="text" id="login_email" class="form-control form-control-sm" placeholder="ログインID">
                    </div>
                    <div class="col-md-4">
                        <label class="section-title">パスワード</label>
                        <input type="password" id="login_password" class="form-control form-control-sm" placeholder="パスワード">
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <small class="text-muted">※ 設定は自動保存されます</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NA登録設定（オリジナルフォームと同デザイン） -->
    <div class="card">
        <div class="card-header text-center consulter-color">
            <h5 class="mb-0 font-weight-bold">対応・NA登録（一括設定）</h5>
            <div class="mt-2">
                <div class="form-check d-inline-flex align-items-center">
                    <input class="form-check-input mr-2" type="checkbox" id="inherit_previous" checked>
                    <label class="form-check-label font-weight-normal" for="inherit_previous" style="font-size:13px;">
                        <i class="fas fa-history mr-1"></i>
                        空欄フィールドは各IDの<strong>直前の登録内容を自動継承</strong>
                        <span class="badge badge-light ml-1" style="font-size:11px;">対応者・ステータス・受発信・通信手段・理由・NA内容</span>
                    </label>
                </div>
            </div>
        </div>
        <div class="card-body p-2">
            <table class="table-input mb-2">
                <!-- Row 1: ヘッダー -->
                <tr>
                    <th style="width:33%">対応日時</th>
                    <th style="width:33%">対応者</th>
                    <th style="width:34%">対応中ステータス</th>
                </tr>
                <!-- Row 2: 入力 -->
                <tr>
                    <td>
                        <span class="badge-auto"><i class="fas fa-clock mr-1"></i>実行当日の現在時刻を自動入力</span>
                    </td>
                    <td>
                        <select id="user_id" class="form-control form-control-sm">
                            <option value="">（空欄→前回値を継承）</option>
                        </select>
                    </td>
                    <td>
                        <select id="mst_contact_status_id" class="form-control form-control-sm">
                            <option value="">（空欄→前回値を継承）</option>
                        </select>
                    </td>
                </tr>
                <!-- Row 3: ヘッダー -->
                <tr>
                    <th>受発信</th>
                    <th>通信手段</th>
                    <th>理由</th>
                </tr>
                <!-- Row 4: 入力 -->
                <tr>
                    <td>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contact_direction_type" id="cdt0" value="">
                            <label class="form-check-label" for="cdt0">（指定なし）</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contact_direction_type" id="cdt1" value="1">
                            <label class="form-check-label" for="cdt1">未選択</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contact_direction_type" id="cdt2" value="2">
                            <label class="form-check-label" for="cdt2">受信</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contact_direction_type" id="cdt3" value="3">
                            <label class="form-check-label" for="cdt3">発信</label>
                        </div>
                    </td>
                    <td>
                        <select id="contact_tool_type" class="form-control form-control-sm">
                            <option value="">（空欄→前回値を継承）</option>
                        </select>
                    </td>
                    <td>
                        <select id="reason" class="form-control form-control-sm">
                            <option value="">（空欄→前回値を継承）</option>
                        </select>
                    </td>
                </tr>
                <!-- Row 5: ヘッダー -->
                <tr>
                    <th>NA日時</th>
                    <th>NA内容</th>
                    <th>不通フラグ</th>
                </tr>
                <!-- Row 6: 入力 -->
                <tr>
                    <td>
                        <div class="row no-gutters">
                            <div class="col-7 pr-1">
                                <input type="text" id="next_action_date" class="form-control form-control-sm" placeholder="YYYY/MM/DD">
                            </div>
                            <div class="col-5">
                                <input type="text" id="next_action_time" class="form-control form-control-sm" placeholder="HH:MM">
                            </div>
                        </div>
                        <small class="text-muted">空欄の場合は入力しません</small>
                    </td>
                    <td>
                        <select id="mst_consulter_next_action_id" class="form-control form-control-sm">
                            <option value="">（空欄→前回値を継承）</option>
                        </select>
                    </td>
                    <td>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_absent">
                            <label class="form-check-label" for="is_absent">不通</label>
                        </div>
                    </td>
                </tr>
                <!-- Row 7: 備考 -->
                <tr>
                    <th colspan="3">備考</th>
                </tr>
                <tr>
                    <td colspan="3">
                        <textarea id="contact_history_note" class="form-control" rows="4"
                            placeholder="全案件に共通で入力する備考内容を入力してください（空欄の場合は入力しません）"></textarea>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <!-- CSV読み込み -->
    <div class="card">
        <div class="card-header consulter-color">
            <i class="fas fa-file-csv mr-2"></i> IDリスト（CSV）
        </div>
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <div class="custom-file">
                        <input type="file" class="custom-file-input" id="csv-file" accept=".csv,.txt">
                        <label class="custom-file-label" for="csv-file">CSVファイルを選択...</label>
                    </div>
                    <small class="text-muted mt-1 d-block">
                        みつ葉の「相談者一覧」CSVをそのまま読み込み可（UTF-8 / Shift-JIS 自動判定）
                    </small>
                </div>
                <div class="col-md-7">
                    <div id="csv-preview" class="mt-2 mt-md-0">
                        <span class="text-muted">ファイルを選択するとIDリストが表示されます</span>
                    </div>
                </div>
            </div>
            <div class="mt-2">
                <span id="csv-count" class="badge badge-secondary">0 件</span>
            </div>
        </div>
    </div>

    <!-- 実行コントロール -->
    <div class="card">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6 mb-2 mb-md-0">
                    <div class="progress">
                        <div id="progress-bar" class="progress-bar bg-info" role="progressbar" style="width:0%">0 / 0</div>
                    </div>
                </div>
                <div class="col-md-6 text-right">
                    <button id="btn-run" class="btn btn-run btn-lg mr-2" onclick="startRun()">
                        <i class="fas fa-play mr-1"></i> 実行開始
                    </button>
                    <button id="btn-stop" class="btn btn-stop btn-lg" onclick="stopRun()" disabled>
                        <i class="fas fa-stop mr-1"></i> 停止
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 進捗ログ -->
    <div class="card">
        <div class="card-header consulter-color d-flex align-items-center">
            <i class="fas fa-terminal mr-2"></i> 進捗ログ
            <button class="btn btn-sm btn-outline-secondary ml-auto" onclick="document.getElementById('log-area').innerHTML=''">クリア</button>
        </div>
        <div class="card-body p-2">
            <div id="log-area"></div>
        </div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

// ────────────────────────────────────────
// セレクトボックスを構築
// ────────────────────────────────────────
function buildSelects() {
    Object.keys(OPTIONS).forEach(key => {
        const sel = document.getElementById(key);
        if (!sel) return;
        OPTIONS[key].forEach(([val, label]) => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = label;
            sel.appendChild(opt);
        });
    });
}

// ────────────────────────────────────────
// 設定の保存・復元
// ────────────────────────────────────────
const savedConfig = {{ config | safe }};

function loadConfig(cfg) {
    if (!cfg || Object.keys(cfg).length === 0) return;
    ['login_email','login_password','user_id','mst_contact_status_id',
     'contact_tool_type','reason','mst_consulter_next_action_id',
     'next_action_date','next_action_time','contact_history_note'].forEach(id => {
        const el = document.getElementById(id);
        if (el && cfg[id] !== undefined) el.value = cfg[id];
    });
    if (cfg.contact_direction_type !== undefined) {
        const r = document.querySelector(`input[name="contact_direction_type"][value="${cfg.contact_direction_type}"]`);
        if (r) r.checked = true;
    }
    if (cfg.is_absent) document.getElementById('is_absent').checked = true;
    const inhEl = document.getElementById('inherit_previous');
    if (inhEl && cfg.inherit_previous !== undefined) inhEl.checked = cfg.inherit_previous;
}

function getConfig() {
    const cdt = document.querySelector('input[name="contact_direction_type"]:checked');
    return {
        login_email:                  document.getElementById('login_email').value,
        login_password:               document.getElementById('login_password').value,
        user_id:                      document.getElementById('user_id').value,
        mst_contact_status_id:        document.getElementById('mst_contact_status_id').value,
        contact_direction_type:       cdt ? cdt.value : '',
        contact_tool_type:            document.getElementById('contact_tool_type').value,
        reason:                       document.getElementById('reason').value,
        next_action_date:             document.getElementById('next_action_date').value,
        next_action_time:             document.getElementById('next_action_time').value,
        mst_consulter_next_action_id: document.getElementById('mst_consulter_next_action_id').value,
        is_absent:                    document.getElementById('is_absent').checked,
        contact_history_note:         document.getElementById('contact_history_note').value,
        inherit_previous:             document.getElementById('inherit_previous').checked,
    };
}

// ────────────────────────────────────────
// CSV読み込み
// ────────────────────────────────────────
let csvIds = [];

function parseCSV(text) {
    csvIds = [];
    const preview = document.getElementById('csv-preview');
    preview.innerHTML = '';

    const lines = text.split(/\r?\n/);
    let idColIndex = 0;  // デフォルト: 1列目

    lines.forEach((line, idx) => {
        if (!line.trim()) return;

        // ヘッダー行の検出: "相談者ID" という文字列を含む場合
        if (idx === 0 || line.includes('相談者ID')) {
            const headers = line.split(',');
            const found = headers.findIndex(h => h.replace(/"/g, '').trim() === '相談者ID');
            if (found >= 0) idColIndex = found;
            return;  // ヘッダー行はスキップ
        }

        // データ行: 行頭が5〜7桁の数字で始まる行のみ対象
        // （引用符内の改行による断片行・本文行を除外）
        const match = line.match(/^"?(\d{5,7})"?,/);
        if (!match) return;

        const id = match[1];
        csvIds.push(id);
        const span = document.createElement('span');
        span.className = 'badge badge-light border mr-1 mb-1';
        span.textContent = id;
        preview.appendChild(span);
    });

    document.getElementById('csv-count').textContent = csvIds.length + ' 件';
    document.getElementById('csv-count').className = 'badge badge-' + (csvIds.length > 0 ? 'primary' : 'secondary');
}

document.getElementById('csv-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.querySelector('.custom-file-label').textContent = file.name;

    // UTF-8で試みる
    const readerUtf8 = new FileReader();
    readerUtf8.onload = function(ev) {
        const text = ev.target.result;
        // 文字化けチェック: 置換文字(U+FFFD)が多ければShift-JISとみなす
        const garbled = (text.match(/\ufffd/g) || []).length;
        if (garbled > 5) {
            // Shift-JISで再読込
            const readerSjis = new FileReader();
            readerSjis.onload = function(ev2) { parseCSV(ev2.target.result); };
            readerSjis.readAsText(file, 'Shift-JIS');
        } else {
            parseCSV(text);
        }
    };
    readerUtf8.readAsText(file, 'UTF-8');
});

// ────────────────────────────────────────
// 実行 / 停止
// ────────────────────────────────────────
function startRun() {
    if (csvIds.length === 0) {
        alert('CSVファイルを読み込んでIDリストを設定してください。');
        return;
    }
    const config = getConfig();
    if (!config.login_email || !config.login_password) {
        alert('ログイン設定（メールアドレス・パスワード）を入力してください。');
        return;
    }

    fetch('/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({config, ids: csvIds})
    })
    .then(r => r.json())
    .then(d => {
        if (d.error) { alert(d.error); return; }
        document.getElementById('btn-run').disabled = true;
        document.getElementById('btn-stop').disabled = false;
        startPolling();
    });
}

function stopRun() {
    fetch('/stop', {method: 'POST'});
}

// ────────────────────────────────────────
// ポーリングでステータス更新
// ────────────────────────────────────────
let pollTimer = null;
let lastLogCount = 0;

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    lastLogCount = 0;
    pollTimer = setInterval(pollStatus, 800);
}

function pollStatus() {
    fetch('/status').then(r => r.json()).then(d => {
        // プログレスバー更新
        const pct = d.total > 0 ? Math.round(d.progress / d.total * 100) : 0;
        const bar = document.getElementById('progress-bar');
        bar.style.width = pct + '%';
        bar.textContent = d.progress + ' / ' + d.total;
        bar.className = 'progress-bar ' + (d.running ? 'bg-info progress-bar-striped progress-bar-animated' : (pct === 100 ? 'bg-success' : 'bg-warning'));

        // ログ追記
        if (d.log && d.log.length > lastLogCount) {
            const area = document.getElementById('log-area');
            for (let i = lastLogCount; i < d.log.length; i++) {
                const msg = d.log[i];
                const line = document.createElement('div');
                if (msg.includes('✓'))       line.className = 'log-ok';
                else if (msg.includes('❌')) line.className = 'log-err';
                else if (msg.includes('⚠'))  line.className = 'log-warn';
                else                          line.className = 'log-info';
                line.textContent = msg;
                area.appendChild(line);
            }
            area.scrollTop = area.scrollHeight;
            lastLogCount = d.log.length;
        }

        // 完了時
        if (!d.running && pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
            document.getElementById('btn-run').disabled = false;
            document.getElementById('btn-stop').disabled = true;
        }
    });
}

// ────────────────────────────────────────
// 初期化
// ────────────────────────────────────────
buildSelects();
loadConfig(savedConfig);
</script>
